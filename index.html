<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leady</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #222222;
      --muted: #777777;
      --accent: #d9486e;
      --accent-light: #ffe6ee;
      --border: #e8e1dc;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-left: 248px;
      transition: padding-left 0.2s ease;
    }

    body.sidebar-collapsed {
      padding-left: 76px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246,243,238,0.94);
      backdrop-filter: blur(10px);
      padding: 18px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    main { padding: 14px; max-width: 720px; margin: 0 auto; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .card h2, .card h3 {
      margin: 0 0 12px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 12px 0 6px;
    }

    input, select, textarea, button {
      width: 100%;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px;
      background: #fff;
    }

    textarea { min-height: 72px; resize: vertical; }

    button {
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
    }

    button.secondary {
      background: var(--accent-light);
      color: var(--accent);
    }

    button.danger {
      background: #f3eeee;
      color: #b00020;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .side-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 248px;
      height: 100vh;
      background: rgba(255,255,255,0.96);
      border-right: 1px solid var(--border);
      z-index: 30;
      padding: 14px 10px;
      transition: width 0.2s ease;
      overflow: hidden;
    }

    .side-nav.collapsed {
      width: 76px;
    }

    .side-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 22px;
    }

    .brand-pill {
      background: #efefef;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 24px;
      font-weight: 800;
      white-space: nowrap;
    }

    .collapse-btn {
      width: 42px;
      min-width: 42px;
      margin: 0;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 24px;
      line-height: 1;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      margin: 4px 0;
      padding: 12px 14px;
      border: none;
      border-radius: 14px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      text-align: left;
    }

    .nav-btn .icon {
      width: 28px;
      min-width: 28px;
      text-align: center;
      font-size: 23px;
      line-height: 1;
    }

    .nav-btn.active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 800;
    }

    .side-nav.collapsed .brand-pill,
    .side-nav.collapsed .label {
      display: none;
    }

    .side-nav.collapsed .side-top {
      justify-content: center;
    }

    .side-nav.collapsed .nav-btn {
      justify-content: center;
      padding: 12px 8px;
    }

    .group-card {
      border: 1px solid var(--border);
      background: #fffdfb;
      border-radius: 16px;
      padding: 14px;
      margin-top: 12px;
    }

    .person-card {
      border: 1px solid var(--border);
      background: #ffffff;
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
    }

    select[multiple] {
      min-height: 112px;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat {
      background: #fffdfb;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    .stat .num {
      font-size: 24px;
      font-weight: 800;
      margin-top: 4px;
    }

    .muted { color: var(--muted); font-size: 13px; }

    .pill-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .pill {
      width: auto;
      white-space: nowrap;
      padding: 9px 12px;
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      border: 1px solid var(--border);
      margin: 0;
    }
    .pill.active { background: var(--accent); color: #fff; }

    .bar-wrap { margin: 10px 0; }
    .bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
    .bar-bg { height: 10px; background: #eee; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 999px; }

    .history-item {
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }
    .history-item:last-child { border-bottom: none; }

    .calendar-head { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
    .calendar-head button { width: auto; padding: 8px 12px; margin: 0; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 12px; }
    .day-name, .day-cell { text-align: center; font-size: 13px; }
    .day-name { color: var(--muted); }
    .day-cell {
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px 2px;
      background: #fffdfb;
      cursor: pointer;
    }
    .day-cell.empty { background: transparent; border: none; cursor: default; }
    .heart { display: block; color: var(--accent); font-size: 14px; margin-top: 2px; }

    .settings-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .settings-list button { width: auto; padding: 6px 10px; margin: 0; }

    @media (min-width: 680px) {
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 760px) {
      body { padding-left: 76px; }
      body.sidebar-open { padding-left: 248px; }
      .side-nav { width: 76px; }
      .side-nav:not(.collapsed) { width: 248px; }
      .side-nav.collapsed .brand-pill,
      .side-nav.collapsed .label { display: none; }
      .side-nav:not(.collapsed) .brand-pill,
      .side-nav:not(.collapsed) .label { display: inline; }
      main { padding: 10px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body class="sidebar-collapsed">
  <nav id="sideNav" class="side-nav collapsed">
    <div class="side-top">
      <div class="brand-pill">Leady</div>
      <button class="collapse-btn" onclick="toggleSidebar()" aria-label="メニュー切替">☰</button>
    </div>
    <button class="nav-btn active" onclick="showTab('today', this)"><span class="icon">🍺</span><span class="label">入力</span></button>
    <button class="nav-btn" onclick="showTab('report', this)"><span class="icon">🔎</span><span class="label">集計</span></button>
    <button class="nav-btn" onclick="showTab('calendar', this)"><span class="icon">📅</span><span class="label">カレンダー</span></button>
    <button class="nav-btn" onclick="showTab('history', this)"><span class="icon">☁️</span><span class="label">履歴</span></button>
    <button class="nav-btn" onclick="showTab('settings', this)"><span class="icon">⚙️</span><span class="label">設定</span></button>
  </nav>

  <header>
    <h1>Leady</h1>
    <div class="subtitle">相席屋活動を記録・分析する個人用ダッシュボード</div>
  </header>

  <main>
    <section id="tab-today" class="tab-content active">
      <div class="card">
        <h2>入力</h2>
        <label>日付</label>
        <input type="date" id="dateInput" />

        <label>場所</label>
        <select id="placeSelect"></select>

        <label>同伴者（複数選択可）</label>
        <select id="partnerSelect" multiple></select>
        <div class="hint">PCはCtrl/Command押しながら複数選択。スマホは複数タップできます。未選択でも保存できます。</div>

        <button class="secondary" onclick="addGroupForm()">＋ 組を追加</button>
        <div id="groupForms"></div>
        <button onclick="saveGroups()">保存する</button>
      </div>

      <div class="card">
        <h3>選択日の記録</h3>
        <div id="selectedDateList" class="muted">まだ記録がありません。</div>
      </div>
    </section>

    <section id="tab-report" class="tab-content">
      <div class="card">
        <h2>分析レポート</h2>
        <label>分析基準日</label>
        <input type="date" id="reportDateInput" />
        <div class="hint">入力画面の日付とは別に、分析したい基準日を選べます。</div>
        <div class="pill-row">
          <button class="pill active" data-range="day" onclick="setReportRange('day')">日間</button>
          <button class="pill" data-range="week" onclick="setReportRange('week')">週間</button>
          <button class="pill" data-range="month" onclick="setReportRange('month')">月間</button>
          <button class="pill" data-range="year" onclick="setReportRange('year')">年間</button>
        </div>
        <p id="reportPeriod" class="muted"></p>
        <div id="statsGrid" class="stats-grid"></div>
      </div>

      <div class="card">
        <h3>点数分布</h3>
        <div id="distribution"></div>
      </div>

      <div class="card">
        <h3>メモ一覧</h3>
        <div id="memoList" class="muted">メモはまだありません。</div>
      </div>
    </section>

    <section id="tab-calendar" class="tab-content">
      <div class="card">
        <div class="calendar-head">
          <button class="secondary" onclick="changeMonth(-1)">前月</button>
          <h2 id="calendarTitle"></h2>
          <button class="secondary" onclick="changeMonth(1)">翌月</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </div>
      <div class="card">
        <h3>選択日の詳細</h3>
        <div id="calendarDayList" class="muted">日付をタップしてください。</div>
      </div>
    </section>

    <section id="tab-history" class="tab-content">
      <div class="card">
        <h2>履歴</h2>
        <div id="historyList" class="muted">まだ記録がありません。</div>
      </div>
    </section>

    <section id="tab-settings" class="tab-content">
      <div class="card">
        <h2>設定</h2>
        <label>同伴者を追加</label>
        <input id="newPartner" placeholder="例：田中" />
        <button onclick="addPartner()">同伴者を追加</button>
        <ul id="partnerList" class="settings-list"></ul>
      </div>

      <div class="card">
        <label>場所候補を追加</label>
        <input id="newPlace" placeholder="例：大宮" />
        <button onclick="addPlace()">場所を追加</button>
        <ul id="placeList" class="settings-list"></ul>
      </div>
    </section>
  </main>


  <script>
    const STORAGE_KEY = 'leady_records_v1';
    const PARTNERS_KEY = 'leady_partners_v1';
    const PLACES_KEY = 'leady_places_v1';

    let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let partners = JSON.parse(localStorage.getItem(PARTNERS_KEY) || '[]');
    let places = JSON.parse(localStorage.getItem(PLACES_KEY) || '[]');
    let reportRange = 'day';
    let calendarDate = new Date();

    const defaultPlaces = ['新宿', '渋谷', '池袋', '恵比寿', '銀座', '六本木', '上野', '横浜', 'その他'];

    function todayStr() {
      const d = new Date();
      return formatDateLocal(d);
    }

    function formatDateLocal(d) {
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function parseDateLocal(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function saveAll() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      localStorage.setItem(PARTNERS_KEY, JSON.stringify(partners));
      localStorage.setItem(PLACES_KEY, JSON.stringify(places));
    }

    function init() {
      if (places.length === 0) places = [...defaultPlaces];
      document.getElementById('dateInput').value = todayStr();
      // 集計タブ専用の分析基準日。入力日付とは独立して管理します。
      document.getElementById('reportDateInput').value = todayStr();
      renderSelects();
      addGroupForm();
      renderAll();
      document.getElementById('dateInput').addEventListener('change', () => { renderSelectedDateList(); });
      document.getElementById('reportDateInput').addEventListener('change', () => { renderReport(); });
    }

    function renderSelects() {
      const placeSelect = document.getElementById('placeSelect');
      const partnerSelect = document.getElementById('partnerSelect');
      const currentPlace = placeSelect.value;
      const selectedPartners = [...partnerSelect.selectedOptions].map(o => o.value);

      placeSelect.innerHTML = places.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
      if (currentPlace && places.includes(currentPlace)) placeSelect.value = currentPlace;

      // 同伴者は「その他」を出さず、設定で登録した名前だけ表示します。
      partnerSelect.innerHTML = partners.length
        ? partners.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')
        : '<option disabled>設定タブで同伴者を追加できます</option>';
      [...partnerSelect.options].forEach(o => { if (selectedPartners.includes(o.value)) o.selected = true; });
      renderSettingsLists();
    }

    function addGroupForm() {
      const wrap = document.getElementById('groupForms');
      const index = wrap.children.length + 1;
      const div = document.createElement('div');
      div.className = 'group-card';
      div.innerHTML = `
        <h3>${index}組目</h3>
        <label>人数</label>
        <select class="people" onchange="updatePersonForms(this)">${options(1, 100)}</select>
        <div class="hint">人数を変更すると、人数分の名前・評価・メモ入力欄が自動で増えます。</div>
        <div class="personForms"></div>
        <button class="danger" onclick="this.parentElement.remove(); renumberGroups();">この組を削除</button>
      `;
      wrap.appendChild(div);
      updatePersonForms(div.querySelector('.people'));
    }

    function updatePersonForms(selectEl) {
      const group = selectEl.closest('.group-card');
      const container = group.querySelector('.personForms');
      const count = Number(selectEl.value || 1);
      const existing = [...container.querySelectorAll('.person-card')].map(readPersonForm);
      container.innerHTML = '';

      for (let i = 0; i < count; i++) {
        const old = existing[i] || {};
        const div = document.createElement('div');
        div.className = 'person-card';
        div.innerHTML = `
          <h4>${i + 1}人目</h4>
          <label>名前・呼び名</label>
          <input class="personName" placeholder="例：黒髪の子 / A子 / 名前" value="${escapeHtml(old.name || '')}" />

          <label>年齢層</label>
          <select class="ageRange">
            ${ageOptions(old.ageRange)}
          </select>

          <div class="row3">
            <div><label>見た目</label><select class="looks">${optionsWithSelected(1, 5, old.looks || 3)}</select></div>
            <div><label>会話</label><select class="talk">${optionsWithSelected(1, 5, old.talk || 3)}</select></div>
            <div><label>また会いたい</label><select class="meetAgain">${optionsWithSelected(1, 5, old.meetAgain || 3)}</select></div>
          </div>

          <label>連絡先交換</label>
          <select class="contact">${contactOptions(old.contact || '△')}</select>

          <label>特徴メモ</label><textarea class="featureMemo" placeholder="例：黒髪、明るい、反応良い">${escapeHtml(old.featureMemo || '')}</textarea>
          <label>アポ取れたか</label><textarea class="appointmentMemo" placeholder="例：来週飲み予定">${escapeHtml(old.appointmentMemo || '')}</textarea>
          <label>その他</label><textarea class="otherMemo">${escapeHtml(old.otherMemo || '')}</textarea>
        `;
        container.appendChild(div);
      }
    }

    function readPersonForm(card) {
      return {
        name: card.querySelector('.personName')?.value.trim() || '',
        ageRange: card.querySelector('.ageRange')?.value || '不明',
        looks: Number(card.querySelector('.looks')?.value || 3),
        talk: Number(card.querySelector('.talk')?.value || 3),
        meetAgain: Number(card.querySelector('.meetAgain')?.value || 3),
        contact: card.querySelector('.contact')?.value || '△',
        featureMemo: card.querySelector('.featureMemo')?.value.trim() || '',
        appointmentMemo: card.querySelector('.appointmentMemo')?.value.trim() || '',
        otherMemo: card.querySelector('.otherMemo')?.value.trim() || ''
      };
    }

    function renumberGroups() {
      [...document.querySelectorAll('#groupForms .group-card h3')].forEach((h, i) => h.textContent = `${i + 1}組目`);
    }

    function options(min, max) {
      let html = '';
      for (let i = min; i <= max; i++) html += `<option value="${i}">${i}</option>`;
      return html;
    }

    function optionsWithSelected(min, max, selected) {
      let html = '';
      for (let i = min; i <= max; i++) html += `<option value="${i}" ${Number(selected) === i ? 'selected' : ''}>${i}</option>`;
      return html;
    }

    function ageOptions(selected = '不明') {
      const list = ['20〜24', '25〜29', '30〜34', '35〜39', '40以上', '不明'];
      return list.map(v => `<option ${v === selected ? 'selected' : ''}>${v}</option>`).join('');
    }

    function contactOptions(selected = '△') {
      return ['◯', '△', '×'].map(v => `<option ${v === selected ? 'selected' : ''}>${v}</option>`).join('');
    }

    function selectedPartnerValues() {
      return [...document.getElementById('partnerSelect').selectedOptions]
        .filter(o => !o.disabled)
        .map(o => o.value);
    }

    function peopleOf(record) {
      if (Array.isArray(record.peopleDetails) && record.peopleDetails.length) return record.peopleDetails;
      // 旧データ互換：以前の1組1評価データを1人目データとして扱う
      return [{
        name: '',
        ageRange: record.ageRange || '不明',
        looks: Number(record.looks || 3),
        talk: Number(record.talk || 3),
        meetAgain: Number(record.meetAgain || 3),
        contact: record.contact || '△',
        featureMemo: record.featureMemo || '',
        appointmentMemo: record.appointmentMemo || '',
        otherMemo: record.otherMemo || ''
      }];
    }

    function flatPeople(data) {
      return data.flatMap(r => peopleOf(r).map(p => ({ ...p, record: r })));
    }

    function saveGroups() {
      const date = document.getElementById('dateInput').value;
      const place = document.getElementById('placeSelect').value;
      const selectedPartners = selectedPartnerValues();
      const forms = [...document.querySelectorAll('#groupForms .group-card')];

      if (!date || forms.length === 0) return alert('日付と1組以上の入力が必要です。');

      forms.forEach((form, i) => {
        const personCards = [...form.querySelectorAll('.person-card')];
        const peopleDetails = personCards.map(readPersonForm);
        records.push({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
          date,
          place,
          partners: selectedPartners,
          // 旧表示用にも残す
          partner: selectedPartners.join('、'),
          groupNo: i + 1,
          people: peopleDetails.length,
          peopleDetails,
          createdAt: new Date().toISOString()
        });
      });

      saveAll();
      document.getElementById('groupForms').innerHTML = '';
      addGroupForm();
      renderAll();
      alert('保存しました。');
    }

    function toggleSidebar() {
      const nav = document.getElementById('sideNav');
      const collapsed = nav.classList.toggle('collapsed');
      document.body.classList.toggle('sidebar-collapsed', collapsed);
      document.body.classList.toggle('sidebar-open', !collapsed);
    }

    function showTab(name, btn) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    }

    function setReportRange(range) {
      reportRange = range;
      document.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b.dataset.range === range));
      renderReport();
    }

    function getFiltered(range) {
      // 集計は入力日ではなく、集計タブの分析基準日を基準にします。
      const selectedStr = document.getElementById('reportDateInput').value || todayStr();
      const selected = parseDateLocal(selectedStr);
      return records.filter(r => {
        const d = parseDateLocal(r.date);
        if (range === 'day') return r.date === selectedStr;
        if (range === 'week') return sameWeek(d, selected);
        if (range === 'month') return d.getFullYear() === selected.getFullYear() && d.getMonth() === selected.getMonth();
        if (range === 'year') return d.getFullYear() === selected.getFullYear();
        return false;
      });
    }

    function sameWeek(a, b) {
      // 月曜始まり〜日曜終わりで週間集計します。
      const start = new Date(b);
      const day = start.getDay();
      const diffToMonday = (day + 6) % 7;
      start.setDate(start.getDate() - diffToMonday);
      start.setHours(0,0,0,0);
      const end = new Date(start);
      end.setDate(end.getDate() + 7);
      return a >= start && a < end;
    }

    function avg(arr, key) {
      if (arr.length === 0) return '-';
      return (arr.reduce((s, r) => s + Number(r[key] || 0), 0) / arr.length).toFixed(1);
    }

    function rate(n, total) {
      if (!total) return '0%';
      return Math.round(n / total * 100) + '%';
    }

    function renderReport() {
      const data = getFiltered(reportRange);
      const persons = flatPeople(data);
      const contactOk = persons.filter(p => p.contact === '◯').length;
      const contactMid = persons.filter(p => p.contact === '△').length;
      const contactNo = persons.filter(p => p.contact === '×').length;
      const peopleTotal = persons.length;

      document.getElementById('reportPeriod').textContent = `対象：${rangeLabel(reportRange)}（基準日：${document.getElementById('reportDateInput').value || todayStr()}） / ${data.length}組・${peopleTotal}人`;
      document.getElementById('statsGrid').innerHTML = `
        ${stat('相席組数', data.length)}
        ${stat('合計人数', peopleTotal)}
        ${stat('平均見た目', avg(persons, 'looks'))}
        ${stat('平均会話', avg(persons, 'talk'))}
        ${stat('また会いたい', avg(persons, 'meetAgain'))}
        ${stat('交換 ◯', contactOk)}
        ${stat('交換 △', contactMid)}
        ${stat('交換 ×', contactNo)}
        ${stat('交換率', rate(contactOk, peopleTotal))}
      `;

      renderDistribution(persons);
      renderMemos(data);
    }

    function rangeLabel(range) {
      return { day: '日間', week: '週間', month: '月間', year: '年間' }[range];
    }

    function stat(label, value) {
      return `<div class="stat"><div class="muted">${label}</div><div class="num">${value}</div></div>`;
    }

    function renderDistribution(data) {
      const target = document.getElementById('distribution');
      target.innerHTML = distBlock('見た目評価', data, 'looks') + distBlock('会話評価', data, 'talk') + distBlock('また会いたい度', data, 'meetAgain');
    }

    function distBlock(title, data, key) {
      let html = `<h4>${title}</h4>`;
      const max = Math.max(1, ...[1,2,3,4,5].map(n => data.filter(r => Number(r[key]) === n).length));
      [1,2,3,4,5].forEach(n => {
        const count = data.filter(r => Number(r[key]) === n).length;
        html += `
          <div class="bar-wrap">
            <div class="bar-label"><span>${n}</span><span>${count}人</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${count / max * 100}%"></div></div>
          </div>`;
      });
      return html;
    }

    function renderMemos(data) {
      const memos = data.flatMap(r => peopleOf(r).map((p, idx) => ({ r, p, idx })))
        .filter(x => x.p.featureMemo || x.p.appointmentMemo || x.p.otherMemo)
        .sort((a,b) => b.r.date.localeCompare(a.r.date));
      document.getElementById('memoList').innerHTML = memos.length ? memos.map(({ r, p, idx }) => `
        <div class="history-item">
          <strong>${escapeHtml(r.date)} / ${escapeHtml(r.place)} / ${escapeHtml(r.groupNo)}組目 / ${idx + 1}人目 ${p.name ? '：' + escapeHtml(p.name) : ''}</strong>
          <div class="muted">特徴：${escapeHtml(p.featureMemo || '-')}</div>
          <div class="muted">アポ：${escapeHtml(p.appointmentMemo || '-')}</div>
          <div class="muted">その他：${escapeHtml(p.otherMemo || '-')}</div>
        </div>`).join('') : 'メモはまだありません。';
    }

    function renderSelectedDateList() {
      const date = document.getElementById('dateInput').value;
      const data = records.filter(r => r.date === date).sort((a,b) => a.groupNo - b.groupNo);
      document.getElementById('selectedDateList').innerHTML = data.length ? data.map(recordHtml).join('') : 'まだ記録がありません。';
    }

    function recordHtml(r) {
      const partnerText = Array.isArray(r.partners) ? r.partners.join('、') : (r.partner || '未選択');
      const people = peopleOf(r);
      return `
        <div class="history-item">
          <strong>${escapeHtml(r.date)} / ${escapeHtml(r.place)} / ${escapeHtml(r.groupNo)}組目</strong>
          <div class="muted">同伴者：${escapeHtml(partnerText || '未選択')} / 人数：${people.length}</div>
          ${people.map((p, idx) => `
            <div class="person-card">
              <strong>${idx + 1}人目 ${p.name ? '：' + escapeHtml(p.name) : ''}</strong>
              <div class="muted">年齢層：${escapeHtml(p.ageRange || '不明')}</div>
              <div class="muted">見た目${p.looks}・会話${p.talk}・また会いたい${p.meetAgain} / 連絡先：${p.contact}</div>
              <div class="muted">特徴：${escapeHtml(p.featureMemo || '-')}</div>
              <div class="muted">アポ：${escapeHtml(p.appointmentMemo || '-')}</div>
                  ${p.otherMemo ? `<div class="muted">その他：${escapeHtml(p.otherMemo)}</div>` : ''}
            </div>
          `).join('')}
        </div>`;
    }

    function renderHistory() {
      const sorted = [...records].sort((a,b) => b.createdAt.localeCompare(a.createdAt));
      document.getElementById('historyList').innerHTML = sorted.length ? sorted.map(r => `
        <div class="history-item">
          ${recordHtml(r)}
          <button class="danger" onclick="deleteRecord('${r.id}')">削除</button>
        </div>`).join('') : 'まだ記録がありません。';
    }

    function deleteRecord(id) {
      if (!confirm('削除しますか？')) return;
      records = records.filter(r => r.id !== id);
      saveAll();
      renderAll();
    }

    function renderCalendar() {
      const y = calendarDate.getFullYear();
      const m = calendarDate.getMonth();
      document.getElementById('calendarTitle').textContent = `${y}年${m + 1}月`;
      const first = new Date(y, m, 1);
      const last = new Date(y, m + 1, 0);
      const grid = document.getElementById('calendarGrid');
      const dayNames = ['日','月','火','水','木','金','土'];
      let html = dayNames.map(d => `<div class="day-name">${d}</div>`).join('');
      for (let i = 0; i < first.getDay(); i++) html += '<div class="day-cell empty"></div>';
      for (let d = 1; d <= last.getDate(); d++) {
        const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const has = records.some(r => r.date === dateStr);
        html += `<div class="day-cell" onclick="showCalendarDay('${dateStr}')">${d}${has ? '<span class="heart">♥</span>' : ''}</div>`;
      }
      grid.innerHTML = html;
    }

    function changeMonth(diff) {
      calendarDate.setMonth(calendarDate.getMonth() + diff);
      renderCalendar();
    }

    function showCalendarDay(dateStr) {
      const data = records.filter(r => r.date === dateStr).sort((a,b) => a.groupNo - b.groupNo);
      document.getElementById('calendarDayList').innerHTML = data.length ? data.map(recordHtml).join('') : `${dateStr} の記録はありません。`;
    }

    function addPartner() {
      const v = document.getElementById('newPartner').value.trim();
      if (!v) return;
      if (!partners.includes(v)) partners.push(v);
      document.getElementById('newPartner').value = '';
      saveAll(); renderSelects();
    }

    function addPlace() {
      const v = document.getElementById('newPlace').value.trim();
      if (!v) return;
      if (!places.includes(v)) places.push(v);
      document.getElementById('newPlace').value = '';
      saveAll(); renderSelects();
    }

    function renderSettingsLists() {
      document.getElementById('partnerList').innerHTML = partners.map(p => `<li>${escapeHtml(p)}<button class="danger" onclick="removePartner('${escapeAttr(p)}')">削除</button></li>`).join('');
      document.getElementById('placeList').innerHTML = places.map(p => `<li>${escapeHtml(p)}<button class="danger" onclick="removePlace('${escapeAttr(p)}')">削除</button></li>`).join('');
    }

    function removePartner(name) { partners = partners.filter(p => p !== name); saveAll(); renderSelects(); }
    function removePlace(name) { places = places.filter(p => p !== name); saveAll(); renderSelects(); }

    function renderAll() {
      renderSelectedDateList();
      renderReport();
      renderHistory();
      renderCalendar();
      renderSelects();
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    }
    function escapeAttr(str) { return String(str).replace(/'/g, "\\'").replace(/\\/g, "\\\\"); }

    init();
  </script>
</body>
</html>
